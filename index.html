<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Order</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        button {
            padding: 10px;
            margin-top: 10px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>Restaurant Order System 🍔</h1>

<div class="box">

<h3>Choose Sandwich</h3>
<select id="sandwich">
    <option value="chicken">Chicken ($5.25)</option>
    <option value="beef">Beef ($6.25)</option>
    <option value="tofu">Tofu ($5.75)</option>
</select>

<h3>Choose Drink</h3>
<select id="drink">
    <option value="small">Small ($1.00)</option>
    <option value="medium">Medium ($1.50)</option>
    <option value="large">Large ($2.00)</option>
</select>

<h3>Fries</h3>
<select id="fries">
    <option value="none">No Fries</option>
    <option value="small">Small ($1.00)</option>
    <option value="medium">Medium ($1.75)</option>
    <option value="large">Large ($2.25)</option>
</select>

<h3>Ketchup Packs ($0.25 each)</h3>
<input type="number" id="ketchup" min="0" value="0">

<br>
<button onclick="calculateTotal()">Place Order</button>

<h2 id="output"></h2>

</div>

<script>
function calculateTotal() {

    let sandwich = document.getElementById("sandwich").value;
    let drink = document.getElementById("drink").value;
    let fries = document.getElementById("fries").value;
    let ketchup = parseInt(document.getElementById("ketchup").value);

    let sandwich_price = 0;
    let drink_price = 0;
    let fries_price = 0;
    let ketchup_price = ketchup * 0.25;

    // Sandwich pricing
    if (sandwich == "chicken") sandwich_price = 5.25;
    if (sandwich == "beef") sandwich_price = 6.25;
    if (sandwich == "tofu") sandwich_price = 5.75;

    // Drink pricing
    if (drink == "small") drink_price = 1.00;
    if (drink == "medium") drink_price = 1.50;
    if (drink == "large") drink_price = 2.00;

    // Fries pricing
    if (fries == "small") fries_price = 1.00;
    if (fries == "medium") fries_price = 1.75;
    if (fries == "large") fries_price = 2.25;

    let total = sandwich_price + drink_price + fries_price + ketchup_price;

    let orderText = "Your order:<br>";
    orderText += "- " + sandwich + " sandwich<br>";
    orderText += "- " + drink + " drink<br>";

    if (fries != "none") {
        orderText += "- " + fries + " fries<br>";
    }

    if (ketchup > 0) {
        orderText += "- " + ketchup + " ketchup packs<br>";
    }

    orderText += "<br>Total: $" + total.toFixed(2);

    document.getElementById("output").innerHTML = orderText;
}
</script>

</body>
</html>
